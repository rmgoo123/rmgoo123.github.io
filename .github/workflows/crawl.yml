name: BRIDGE 대사관 페이지 크롤링

on:
  # 매일 한국시간 오전 9시 실행 (UTC 기준 0시)
  schedule:
    - cron: '0 0 * * *'

  # 수동 실행도 가능하게
  workflow_dispatch:

jobs:
  crawl:
    runs-on: ubuntu-latest

    steps:
      # 1. 저장소 코드 불러오기
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      # 2. Python 설치
      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. 라이브러리 설치
      - name: 라이브러리 설치
        run: pip install requests beautifulsoup4

      # 4. 크롤러 실행
      - name: 크롤러 실행
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python crawler.py
